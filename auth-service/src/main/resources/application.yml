spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

common-service:
  url: http://common-service:8080

jwt:
  secret: globalauthsystemsecretkeyglobalauthsystemsecretkeyglobalauthsystemsecretkey
  expiration: 3600000 # 1 hour

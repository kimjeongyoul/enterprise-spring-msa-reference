version: '3.8'

services:
  # Infrastructure
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - msa-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - msa-network

  redis:
    image: redis:alpine
    command: redis-server --notify-keyspace-events Ex
    ports:
      - "6379:6379"
    networks:
      - msa-network

  # Services
  common-service:
    build:
      context: ./common-service
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:commondb
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
    networks:
      - msa-network

  auth-service:
    build:
      context: ./auth-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:authdb
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
    networks:
      - msa-network

  product-service:
    build:
      context: ./product-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:productdb
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
    networks:
      - msa-network

  order-service:
    build:
      context: ./order-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:orderdb
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
    networks:
      - msa-network

  payment-service:
    build:
      context: ./payment-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:paymentdb
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
    networks:
      - msa-network

  notification-service:
    build:
      context: ./notification-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:notidb
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
    networks:
      - msa-network

  community-service:
    build:
      context: ./community-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:communitydb
      - SPRING_DATA_REDIS_HOST=redis
    networks:
      - msa-network

  gateway-service:
    build:
      context: ./gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - JWT_SECRET=globalauthsystemsecretkeyglobalauthsystemsecretkeyglobalauthsystemsecretkey
    networks:
      - msa-network

networks:
  msa-network:
    driver: bridge

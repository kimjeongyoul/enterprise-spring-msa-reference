server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/orders/**

        - id: user-service-example
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

jwt:
  secret: c2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24taW4tZ2xvYmFsLWF1dGgtc3lzdGVt

# For local testing without discovery service, you might want to use fixed URIs

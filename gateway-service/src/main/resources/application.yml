server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service-example
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

jwt:
  secret: c2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24taW4tZ2xvYmFsLWF1dGgtc3lzdGVt

# For local testing without discovery service, you might want to use fixed URIs
# - id: auth-service
#   uri: http://localhost:8081
#   predicates:
#     - Path=/api/v1/auth/**
